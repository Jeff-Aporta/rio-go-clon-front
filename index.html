  <script>
    (function () {
      function b64urlDecode(s) {
        var pad = s.length % 4 === 0 ? "" : "=".repeat(4 - (s.length % 4));
        var b64 = s.replace(/-/g, "+").replace(/_/g, "/") + pad;
        try { return decodeURIComponent(escape(atob(b64))); } catch (e) {
          try { return atob(b64); } catch (e2) { return ""; }
        }
      }
      function readConnFromUrl() {
        try {
          var c = new URLSearchParams(location.search).get("conn");
          if (c) {
            var j = JSON.parse(b64urlDecode(c));
            if (j && (j.apiBase || j.a)) return j;
          }
        } catch (e) {}
        return null;
      }
      var conn = readConnFromUrl();
      var onHub = !conn;
      var prefix = (conn && (conn.storagePrefix || conn.p || conn.appId || conn.i)) || "storefront";

      var m = "dark";
      try {
        var v = localStorage.getItem(prefix + ":theme") || localStorage.getItem("storefront:theme");
        if (v === "light" || v === "dark") m = v;
        else if (!onHub) {
          var brandRaw = localStorage.getItem(prefix + ":brand");
          if (brandRaw) {
            var b0 = JSON.parse(brandRaw);
            if (b0 && (b0.defaultTheme === "light" || b0.defaultTheme === "dark")) m = b0.defaultTheme;
          }
        }
      } catch (e) {}
      document.documentElement.classList.add("wa-theme-shoelace", "wa-palette-shoelace");
      document.documentElement.classList.add(m === "dark" ? "wa-dark" : "wa-light");
      document.documentElement.classList.remove(m === "dark" ? "wa-light" : "wa-dark");
      document.documentElement.style.colorScheme = m;
      if (onHub) {
        document.documentElement.setAttribute("data-app", "dulceclic");
        document.title = "Dulce Clic — Pedidos online";
        var metaHub = document.querySelector('meta[name="theme-color"]');
        if (metaHub) metaHub.setAttribute("content", m === "light" ? "#faf5ff" : "#0b0712");
      }

      try {
        if (onHub || !conn) return;
        var raw = localStorage.getItem(prefix + ":brand");
        if (!raw) return;
        var brand = JSON.parse(raw);
        var themes = brand && brand.themes;
        var pal = themes && (themes[m] || themes.dark || themes.light);
        if (!pal || typeof pal.bg !== "string") return;
        var map = {
          bg: "--rg-bg",
          surface: "--rg-surface",
          surface2: "--rg-surface-2",
          line: "--rg-line",
          text: "--rg-text",
          muted: "--rg-muted",
          accent: "--rg-accent",
          accent2: "--rg-accent-2",
          ok: "--rg-ok",
          danger: "--rg-danger",
          headerBg: "--rg-header-bg",
          priceBar: "--rg-price-bar",
          heroCaption: "--rg-hero-caption",
        };
        var root = document.documentElement;
        for (var k in map) {
          if (typeof pal[k] === "string" && pal[k]) root.style.setProperty(map[k], pal[k]);
        }
        if (pal.accent) {
          root.style.setProperty("--wa-color-brand-fill-loud", pal.accent);
          root.style.setProperty("--wa-color-brand-fill-normal", pal.accent);
          root.style.setProperty("--wa-color-brand-50", pal.accent);
          root.style.setProperty("--wa-color-brand-60", pal.accent);
        }
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", pal.bg);
        if (brand.name) document.title = brand.name + " — Pedidos";
        var bid = String(brand.id || "").toLowerCase().replace(/[^a-z0-9]+/g, "");
        if (bid.indexOf("jacobo") >= 0) document.documentElement.setAttribute("data-app", "donjacobo");
        else if (bid.indexOf("rio") >= 0) document.documentElement.setAttribute("data-app", "riogo");
        else if (bid) document.documentElement.setAttribute("data-app", bid);
      } catch (e) {}
    })();
  </script>
